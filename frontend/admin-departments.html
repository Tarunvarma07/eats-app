<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Departments — EATS Admin</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="global-error" style="display:none; position:fixed; top:1rem; right:1rem;
     background:#fee; border:1px solid #c00; padding:0.75rem 1.5rem; border-radius:6px;
     color:#c00; z-index:9999;"></div>
<div id="global-success" style="display:none; position:fixed; top:1rem; right:1rem;
     background:#efe; border:1px solid #080; padding:0.75rem 1.5rem; border-radius:6px;
     color:#080; z-index:9999;"></div>

<div class="app-layout">

  <aside class="sidebar admin">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🛡️</div>
      <span class="sidebar-logo-text">EATS</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" onclick="window.location.href='/app/admin.html'">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/app/admin-users.html'">
        <span class="nav-icon">👥</span><span class="nav-label">Users</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/app/admin-attendance.html'">
        <span class="nav-icon">📋</span><span class="nav-label">All Attendance</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/app/admin-reports.html'">
        <span class="nav-icon">📊</span><span class="nav-label">Reports</span>
      </button>
      <button class="nav-item active">
        <span class="nav-icon">🏢</span><span class="nav-label">Departments</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/app/admin-settings.html'">
        <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
      </button>
      <button class="nav-item" id="logoutNav">
        <span class="nav-icon">🚪</span><span class="nav-label">Logout</span>
      </button>
    </nav>
  </aside>

  <div class="main-area">
    <header class="main-header">
      <div class="main-header-title">Departments</div>
      <div class="main-header-right">
        <span class="header-bell">🔔</span>
        <span style="font-size:13px;color:#374151">Welcome, <strong id="headerName">Admin</strong></span>
        <div class="header-avatar" style="background:linear-gradient(135deg,#14532d,#16a34a)" id="headerAvatar">A</div>
      </div>
    </header>

    <div class="main-content">
      <div class="table-card">
        <div class="table-card-header">
          <h2>Department Overview</h2>
        </div>
        <table>
          <thead>
            <tr>
              <th>Department</th>
              <th>Total Employees</th>
              <th>Active Today</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="deptBody">
            <tr><td colspan="4" class="loading-cell"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  if (!requireAuth()) throw 0;
  const user = currentUser();
  if (user?.role !== 'admin') window.location.href = '/app/dashboard.html';

  document.getElementById('headerName').textContent   = user?.name || 'Admin';
  document.getElementById('headerAvatar').textContent = initials(user?.name || 'A');

  document.getElementById('logoutNav').addEventListener('click', async () => {
    try { await apiFetch('/api/v1/auth/logout', { method:'POST' }); } catch {}
    clearToken(); window.location.href = '/app/index.html';
  });

  async function loadDepartments() {
    try {
      // Get all users to calculate department stats
      const usersResponse = await apiFetch('/api/v1/admin/employees');
      const users = usersResponse.data || [];
      
      // Get today's attendance
      const today = await apiFetch('/api/v1/admin/attendance/today');
      
      // Calculate department stats
      const departments = ['HR', 'IT', 'FINANCE', 'OPERATIONS'];
      const deptStats = departments.map(dept => {
        const deptUsers = users.filter(u => u.department === dept);
        const activeToday = today.filter(t => t.department === dept && !t.logout_time).length;
        return {
          name: dept,
          total: deptUsers.length,
          active: activeToday,
          status: activeToday > 0 ? 'Active' : 'Inactive'
        };
      });

      const tbody = document.getElementById('deptBody');
      
      if (!deptStats.length) {
        tbody.textContent = 'No departments found.';
        return;
      }

      tbody.innerHTML = deptStats.map(d => `<tr>
        <td><strong>${escapeHtml(d.name)}</strong></td>
        <td>${d.total}</td>
        <td>${d.active}</td>
        <td><span style="font-size:12px;font-weight:600;color:${d.status === 'Active' ? '#059669' : '#6b7280'}">${d.status}</span></td>
      </tr>`).join('');
    } catch (err) {
      document.getElementById('deptBody').innerHTML = '<tr><td colspan="4" style="color:#ef4444">Failed to load department data. Please try again.</td></tr>';
      showError(err.message || 'Failed to load departments');
    }
  }

  loadDepartments();
</script>
</body>
</html>
