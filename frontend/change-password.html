<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Change Password — EATS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="global-error" style="display:none; position:fixed; top:1rem; right:1rem;
     background:#fee; border:1px solid #c00; padding:0.75rem 1.5rem; border-radius:6px;
     color:#c00; z-index:9999;"></div>
<div id="global-success" style="display:none; position:fixed; top:1rem; right:1rem;
     background:#efe; border:1px solid #080; padding:0.75rem 1.5rem; border-radius:6px;
     color:#080; z-index:9999;"></div>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar emp" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🛡️</div>
      <span class="sidebar-logo-text">EATS</span>
      <span class="sidebar-logo-bell">🔔</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" onclick="window.location.href='/app/dashboard.html'">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/app/dashboard.html'">
        <span class="nav-icon">📅</span><span class="nav-label">My Attendance</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/app/attendance-history.html'">
        <span class="nav-icon">📋</span><span class="nav-label">Attendance History</span>
      </button>
      <button class="nav-item" onclick="window.location.href='/app/profile.html'">
        <span class="nav-icon">👤</span><span class="nav-label">Profile</span>
      </button>
      <button class="nav-item active">
        <span class="nav-icon">🔑</span><span class="nav-label">Change Password</span>
      </button>
      <button class="nav-item" id="logoutNav" style="margin-top:auto">
        <span class="nav-icon">🚪</span><span class="nav-label">Logout</span>
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="main-header">
      <div class="main-header-title">Change Password</div>
      <div class="main-header-right">
        <span class="header-bell">🔔</span>
        <span style="font-size:13px;color:#374151">Welcome, <strong id="headerName"></strong></span>
        <div class="header-avatar" id="headerAvatar">S</div>
      </div>
    </header>

    <div class="main-content">
      <div class="table-card">
        <div class="table-card-header">
          <h2>Change Your Password</h2>
        </div>
        <div style="max-width:440px;padding:20px">
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input id="currentPw" type="password" class="form-input no-icon" placeholder="Enter current password" required/>
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input id="newPw" type="password" class="form-input no-icon" placeholder="Min 6 characters" required minlength="6"/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input id="confirmPw" type="password" class="form-input no-icon" placeholder="Confirm new password" required minlength="6"/>
          </div>
          <div id="formAlert" class="auth-alert error"></div>
          <button onclick="submitChangePassword()" id="submitBtn"
                  style="width:100%;padding:12px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-size:14px;font-weight:600;margin-top:10px">
            Change Password
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  if (!requireAuth()) throw 0;
  const user = currentUser();
  if (user?.role === 'admin') window.location.href = '/app/admin.html';

  document.getElementById('headerName').textContent  = user?.name || 'Employee';
  document.getElementById('headerAvatar').textContent = initials(user?.name || '?');

  document.getElementById('logoutNav').addEventListener('click', async () => {
    try { await apiFetch('/api/v1/auth/logout', { method:'POST' }); } catch {}
    clearToken(); window.location.href = '/app/index.html';
  });

  async function submitChangePassword() {
    const alertEl = document.getElementById('formAlert');
    const submitBtn = document.getElementById('submitBtn');
    alertEl.className = 'auth-alert error';

    const current = document.getElementById('currentPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;

    if (!current || !newPw || !confirm) {
      alertEl.textContent = 'All fields are required.';
      alertEl.className = 'auth-alert error show'; return;
    }

    if (newPw.length < 6) {
      alertEl.textContent = 'New password must be at least 6 characters.';
      alertEl.className = 'auth-alert error show'; return;
    }

    if (newPw !== confirm) {
      alertEl.textContent = 'New passwords do not match.';
      alertEl.className = 'auth-alert error show'; return;
    }

    submitBtn.disabled = true; submitBtn.textContent = 'Changing…';
    try {
      await apiFetch('/api/v1/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ current_password: current, new_password: newPw }),
      });
      document.getElementById('currentPw').value = '';
      document.getElementById('newPw').value = '';
      document.getElementById('confirmPw').value = '';
      showSuccess('Password changed successfully');
    } catch (err) {
      alertEl.textContent = err.message || 'Failed to change password.';
      alertEl.className = 'auth-alert error show';
    } finally {
      submitBtn.disabled = false; submitBtn.textContent = 'Change Password';
    }
  }
</script>
</body>
</html>
